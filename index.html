<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExamHub - ระบบทำข้อสอบออนไลน์</title>
  
  <!-- โหลด Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- โหลด React และ ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- โหลด Babel สำหรับคอมไพล์ JSX ในเบราว์เซอร์ -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 🌟 โหลด Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    
    .loader {
      border-top-color: #3b82f6;
      animation: spinner 1.5s linear infinite;
    }
    @keyframes spinner {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // ==========================================
    // ชุดไอคอน SVG (Lucide Style)
    // ==========================================
    const Icon = ({ path, className = "w-6 h-6", ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
        {path}
      </svg>
    );

    const Home = (p) => <Icon path={<><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>} {...p} />;
    const BookOpen = (p) => <Icon path={<><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></>} {...p} />;
    const BarChart2 = (p) => <Icon path={<><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></>} {...p} />;
    const UserIcon = (p) => <Icon path={<><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>} {...p} />;
    const Settings = (p) => <Icon path={<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></>} {...p} />;
    const LogOut = (p) => <Icon path={<><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>} {...p} />;
    const PlusCircle = (p) => <Icon path={<><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></>} {...p} />;
    const Edit3 = (p) => <Icon path={<><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></>} {...p} />;
    const CheckCircle = (p) => <Icon path={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>} {...p} />;
    const AlertCircle = (p) => <Icon path={<><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>} {...p} />;
    const Menu = (p) => <Icon path={<><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></>} {...p} />;
    const X = (p) => <Icon path={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} {...p} />;
    const Trash2 = (p) => <Icon path={<><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>} {...p} />;
    const Save = (p) => <Icon path={<><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>} {...p} />;
    const UsersIcon = (p) => <Icon path={<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>} {...p} />;
    const SearchIcon = (p) => <Icon path={<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>} {...p} />;
    const FilterIcon = (p) => <Icon path={<><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></>} {...p} />;
    const DownloadIcon = (p) => <Icon path={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>} {...p} />;
    const ClockIcon = (p) => <Icon path={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>} {...p} />;
    const ShieldCheck = (p) => <Icon path={<><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></>} {...p} />;

    // ==========================================
    // ส่วนที่ 1: การตั้งค่า API สำหรับ Google Sheets และ Google Login
    // ==========================================
    const API_URL = 'https://script.google.com/macros/s/AKfycbxBSJp4PnTqu5LsJR2BWZY19VeT6tlugYVje6lww29h4GcPpQdCEOGGZ64CNUW_5Xadbw/exec';
    const GOOGLE_CLIENT_ID = '360247101642-d71co31lo886oh9tdhcgo4pei77fvrcf.apps.googleusercontent.com'; 

    function parseJwt(token) {
      try {
        const base64Url = token.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(jsonPayload);
      } catch (e) { return null; }
    }

    // ==========================================
    // ส่วนที่ 2: คอมโพเนนต์หลัก (Main App)
    // ==========================================
    function App() {
      const [currentUser, setCurrentUser] = useState(null);
      const [currentView, setCurrentView] = useState('login');
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);
      const [loading, setLoading] = useState(false);
      const [fetchError, setFetchError] = useState(false);
      
      const [announcements, setAnnouncements] = useState([]);
      const [exams, setExams] = useState([]);
      const [results, setResults] = useState([]);
      const [users, setUsers] = useState([]);
      const [systemRules, setSystemRules] = useState("1. ห้ามใช้เครื่องคำนวณ\n2. ห้ามเปิดหน้าต่างอื่นขณะทำข้อสอบ\n3. ต้องทำข้อสอบให้เสร็จภายในเวลาที่กำหนด");

      useEffect(() => {
        const fetchData = async () => {
          if (!API_URL) return;
          setLoading(true);
          setFetchError(false);

          try {
            const res = await fetch(`${API_URL}?action=getAllData`);
            if (!res.ok) throw new Error('Fetch Error');
            const data = await res.json();
            setAnnouncements(data.announcements || []);
            setExams(data.exams || []);
            setResults(data.results || []);
            setUsers(data.users || []);
            if (data.settings?.rules) setSystemRules(data.settings.rules);
          } catch (error) {
            console.warn("Using offline fallback mode");
            setFetchError(true);
            setUsers([{ uid: 'admin_1', name: 'แอดมิน (Demo)', email: 'admin@school.com', role: 'admin' }]);
          } finally {
            setLoading(false);
          }
        };
        fetchData();
      }, []);

      const handleGoogleLogin = (email, googleName) => {
        const user = users.find(u => u.email === email);
        if (user) {
          setCurrentUser({ ...user, name: (user.name && user.name !== 'ไม่ทราบชื่อ') ? user.name : googleName });
          setCurrentView('home');
        } else {
          alert(`อีเมล ${email} ไม่ได้รับอนุญาตให้เข้าใช้งาน กรุณาติดต่อแอดมิน`);
        }
      };

      const apiRequest = async (action, data) => {
        if (!API_URL || fetchError) return; 
        try {
          await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({ action, data }),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
          });
        } catch (error) { console.error(error); }
      };

      const handleSaveResult = (examId, score, total) => {
        const newResult = {
          id: Date.now(), userId: currentUser.uid, examId,
          examTitle: exams.find(e => e.id === examId).title,
          score, total, date: new Date().toISOString()
        };
        setResults([...results, newResult]);
        apiRequest('saveResult', newResult);
      };

      if (currentView === 'login') return <LoginScreen onLogin={handleGoogleLogin} loading={loading} fetchError={fetchError} />;

      const isTakingExam = currentView.startsWith('take_exam_') || currentView.startsWith('rules_');

      return (
        <div className="flex h-screen bg-gray-50 text-gray-800 font-sans overflow-hidden">
          {!isTakingExam && isSidebarOpen && <div className="fixed inset-0 bg-gray-900/50 z-20 lg:hidden" onClick={() => setIsSidebarOpen(false)} />}
          {!isTakingExam && (
            <aside className={`fixed lg:static inset-y-0 left-0 transform ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'} lg:translate-x-0 transition-transform duration-300 ease-in-out w-64 bg-white border-r border-gray-200 flex flex-col shadow-sm z-30`}>
              <div className="p-6 border-b border-gray-100 flex justify-between items-center">
                <h1 className="text-xl font-bold text-blue-600 flex items-center gap-2"><BookOpen className="w-6 h-6" /> ExamHub</h1>
                <button className="lg:hidden text-gray-400" onClick={() => setIsSidebarOpen(false)}><X className="w-5 h-5" /></button>
              </div>
              <nav className="flex-1 p-4 space-y-1">
                <NavItem icon={<Home />} label="หน้าหลัก" isActive={currentView === 'home'} onClick={() => {setCurrentView('home'); setIsSidebarOpen(false);}} />
                <NavItem icon={<BookOpen />} label="คลังข้อสอบ" isActive={currentView === 'exams'} onClick={() => {setCurrentView('exams'); setIsSidebarOpen(false);}} />
                <NavItem icon={<BarChart2 />} label="ผลการสอบ" isActive={currentView === 'dashboard'} onClick={() => {setCurrentView('dashboard'); setIsSidebarOpen(false);}} />
                <NavItem icon={<UserIcon />} label="โปรไฟล์" isActive={currentView === 'profile'} onClick={() => {setCurrentView('profile'); setIsSidebarOpen(false);}} />
                {currentUser?.role === 'admin' && (
                  <div className="pt-4 mt-4 border-t border-gray-100">
                    <p className="px-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Admin Panel</p>
                    <NavItem icon={<Settings />} label="จัดการระบบ" isActive={currentView === 'admin'} onClick={() => {setCurrentView('admin'); setIsSidebarOpen(false);}} />
                  </div>
                )}
              </nav>
              <div className="p-4 border-t border-gray-100">
                <div className="flex items-center gap-3 mb-4 px-2">
                  <div className="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold shrink-0">{currentUser?.name?.charAt(0)}</div>
                  <div className="overflow-hidden"><p className="text-sm font-bold truncate">{currentUser?.name}</p><p className="text-[10px] text-gray-400 uppercase">{currentUser?.role}</p></div>
                </div>
                <button onClick={() => setCurrentView('login')} className="w-full flex items-center justify-center gap-2 py-2 text-sm text-red-600 hover:bg-red-50 rounded-lg transition-colors"><LogOut className="w-4 h-4" /> ออกจากระบบ</button>
              </div>
            </aside>
          )}

          <div className="flex-1 flex flex-col h-screen overflow-hidden">
            {!isTakingExam && (
              <header className="lg:hidden bg-white border-b border-gray-200 p-4 flex items-center gap-3 shadow-sm z-10">
                <button onClick={() => setIsSidebarOpen(true)} className="p-2 text-gray-600"><Menu className="w-6 h-6" /></button>
                <h1 className="text-xl font-bold text-blue-600">ExamHub</h1>
              </header>
            )}
            <main className="flex-1 overflow-y-auto bg-gray-50/50">
              <div className="p-4 md:p-8 max-w-5xl mx-auto">
                {currentView === 'home' && <HomeScreen announcements={announcements} />}
                {currentView === 'exams' && <ExamBank exams={exams} results={results} currentUser={currentUser} onTakeExam={(exam) => setCurrentView(`rules_${exam.id}`)} />}
                
                {currentView.startsWith('rules_') && (
                  <RulesPage 
                    rules={systemRules} 
                    exam={exams.find(e => e.id === parseInt(currentView.replace('rules_', '')))}
                    onAccept={(examId) => setCurrentView(`take_exam_${examId}`)}
                    onCancel={() => setCurrentView('exams')}
                  />
                )}

                {currentView.startsWith('take_exam_') && (
                  <QuizTaker 
                    exam={exams.find(e => e.id === parseInt(currentView.replace('take_exam_', '')))} 
                    onFinish={(score, total) => { handleSaveResult(parseInt(currentView.replace('take_exam_', '')), score, total); setCurrentView('dashboard'); }}
                    onCancel={() => { if(window.confirm('ยกเลิกการทำข้อสอบ?')) setCurrentView('exams'); }}
                  />
                )}

                {currentView === 'dashboard' && <Dashboard results={results.filter(r => r.userId === currentUser.uid)} />}
                {currentView === 'profile' && <ProfileScreen user={currentUser} onSave={(d) => { const nU = {...currentUser, ...d}; setCurrentUser(nU); setUsers(users.map(u=>u.uid===nU.uid?nU:u)); apiRequest('saveUser', nU); }} />}
                {currentView === 'admin' && (
                  <AdminPanel 
                    exams={exams} announcements={announcements} results={results} users={users} rules={systemRules}
                    onSaveRules={(newRules) => { setSystemRules(newRules); apiRequest('saveSettings', { rules: newRules }); }}
                    onSaveExam={(d) => { const isN = !d.id; const fD = isN ? {...d, id: Date.now()} : d; setExams(isN ? [...exams, fD] : exams.map(e=>e.id===fD.id?fD:e)); apiRequest('saveExam', fD); }}
                    onDeleteExam={(id) => { if(confirm('ลบข้อสอบ?')){ setExams(exams.filter(e=>e.id!==id)); apiRequest('deleteExam', {id}); } }}
                    onSaveAnnouncement={(d) => { const isN = !d.id; const fD = isN ? {...d, id: Date.now(), date: new Date().toISOString().split('T')[0]} : d; setAnnouncements(isN ? [fD, ...announcements] : announcements.map(a=>a.id===fD.id?fD:a)); apiRequest('saveAnnouncement', fD); }}
                    onDeleteAnnouncement={(id) => { if(confirm('ลบประกาศ?')){ setAnnouncements(announcements.filter(a=>a.id!==id)); apiRequest('deleteAnnouncement', {id}); } }}
                    onSaveUser={(d) => { const isN = !d.uid; const fD = isN ? {...d, uid: 'user_'+Date.now(), role: 'student'} : d; setUsers(isN ? [...users, fD] : users.map(u=>u.uid===fD.uid?fD:u)); apiRequest('saveUser', fD); }}
                    onDeleteUser={(uid) => { if(confirm('ลบนักเรียน?')){ setUsers(users.filter(u=>u.uid!==uid)); apiRequest('deleteUser', {uid}); } }}
                    onDeleteResult={(id) => { if(confirm('ลบประวัติการสอบ? (การลบจะทำให้นักเรียนกลับมาทำข้อสอบชุดนี้ได้อีกครั้ง)')) { setResults(results.filter(r => r.id !== id)); apiRequest('deleteResult', {id}); } }}
                  />
                )}
              </div>
            </main>
          </div>
        </div>
      );
    }

    // --- คอมโพเนนต์หน้ากฎระเบียบ ---
    function RulesPage({ rules, exam, onAccept, onCancel }) {
      return (
        <div className="max-w-2xl mx-auto animate-in fade-in zoom-in-95 duration-300">
          <div className="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
            <div className="bg-blue-600 p-8 text-center text-white">
              <ShieldCheck className="w-16 h-16 mx-auto mb-4" />
              <h2 className="text-2xl font-black mb-2">กฎระเบียบการทำข้อสอบ</h2>
              <p className="opacity-80 font-medium">{exam.title}</p>
            </div>
            <div className="p-8">
              <div className="bg-gray-50 rounded-2xl p-6 mb-8 border border-gray-100">
                <p className="whitespace-pre-line text-gray-700 leading-relaxed font-medium">
                  {rules || "ไม่มีข้อกำหนดเป็นพิเศษ"}
                </p>
              </div>
              <div className="flex flex-col gap-3">
                <button 
                  onClick={() => onAccept(exam.id)}
                  className="w-full py-4 bg-blue-600 text-white font-black rounded-2xl hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all transform active:scale-95"
                >
                  ฉันยอมรับและต้องการเริ่มทำข้อสอบ
                </button>
                <button 
                  onClick={onCancel}
                  className="w-full py-3 text-gray-400 font-bold hover:text-gray-600 transition-colors"
                >
                  ย้อนกลับ
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function LoginScreen({ onLogin, loading, fetchError }) {
      const [manualEmail, setManualEmail] = useState('');
      useEffect(() => {
        if (!GOOGLE_CLIENT_ID || loading) return;
        const handleCredentialResponse = (res) => {
          const payload = parseJwt(res.credential);
          if (payload?.email) onLogin(payload.email, payload.name);
        };
        const initGSI = () => {
          if (window.google) {
            google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleCredentialResponse });
            google.accounts.id.renderButton(document.getElementById("gbtn"), { theme: "outline", size: "large", width: "100%", shape: "pill" });
          } else setTimeout(initGSI, 200);
        };
        initGSI();
      }, [loading]);
      
      if(loading) return <div className="min-h-screen flex items-center justify-center"><div className="loader rounded-full border-4 h-12 w-12"></div></div>;

      return (
        <div className="min-h-screen flex flex-col justify-center py-12 px-4">
          <div className="max-w-md w-full mx-auto text-center space-y-8">
            <div className="flex justify-center text-blue-600"><BookOpen className="w-16 h-16" /></div>
            <h2 className="text-3xl font-black text-gray-900">ExamHub</h2>
            <div className="bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
              {!GOOGLE_CLIENT_ID && <div className="mb-6 p-4 bg-yellow-50 text-yellow-800 rounded-lg text-xs">กรุณาระบุ <b>GOOGLE_CLIENT_ID</b></div>}
              <div id="gbtn" className="flex justify-center"></div>
              {(fetchError || !GOOGLE_CLIENT_ID) && (
                <div className="mt-8 pt-8 border-t border-gray-100 space-y-4">
                  <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">หรือเข้าสู่ระบบด้วยอีเมล</p>
                  <div className="flex gap-2">
                    <input type="email" value={manualEmail} onChange={e => setManualEmail(e.target.value)} placeholder="admin@school.com" className="flex-1 p-2 border border-gray-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500" />
                    <button onClick={() => onLogin(manualEmail, 'Admin')} className="px-4 py-2 bg-blue-600 text-white text-sm font-bold rounded-lg hover:bg-blue-700">ยืนยัน</button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    function HomeScreen({ announcements }) {
      return (
        <div className="space-y-6">
          <h2 className="text-2xl font-bold text-gray-900">ประกาศจากผู้ดูแล</h2>
          <div className="grid gap-4">
            {announcements.map(ann => (
              <div key={ann.id} className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">

    function ExamBank({ exams, results, currentUser, onTakeExam }) {
      const now = new Date();
      // กรองข้อสอบที่ได้รับมอบหมาย
      const visible = exams.filter(e => !e.assignedUsers?.length || e.assignedUsers.includes(currentUser.uid) || currentUser.role === 'admin');
      
      return (
        <div className="space-y-6">
          <h2 className="text-2xl font-bold text-gray-900">คลังข้อสอบ</h2>
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {visible.map(exam => {
              const start = exam.startTime ? new Date(exam.startTime) : null;
              const isAvailable = exam.isOpen && (!start || start <= now);
              // ตรวจสอบว่าเคยทำไปหรือยัง (1 ครั้ง)
              const hasAttempted = results.some(r => r.userId === currentUser.uid && r.examId === exam.id);

              return (
                <div key={exam.id} className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col group">
                  <div className={`h-2 ${hasAttempted ? 'bg-green-400' : isAvailable ? 'bg-blue-500' : 'bg-gray-300'}`}></div>
                  <div className="p-6 flex-1 flex flex-col">
                    <div className="flex justify-between items-start mb-2">
                      <h3 className="font-bold text-lg">{exam.title}</h3>
                      {hasAttempted ? (
                        <span className="text-[10px] font-bold text-green-600 bg-green-50 px-2 py-1 rounded-full uppercase">Finished</span>
                      ) : !isAvailable && (
                        <span className="text-[10px] font-bold text-red-500 uppercase">Locked</span>
                      )}
                    </div>
                    <p className="text-gray-400 text-xs mb-6 line-clamp-2">{exam.description || 'ไม่มีข้อมูลเพิ่มเติม'}</p>
                    <div className="flex justify-between text-[10px] font-bold text-gray-400 uppercase mb-6">
                      <span className="flex items-center gap-1"><BookOpen className="w-3 h-3"/> {exam.questions?.length} Qs</span>
                      <span className="flex items-center gap-1"><ClockIcon className="w-3 h-3"/> {exam.duration} Mins</span>
                    </div>
                    
                    {hasAttempted ? (
                      <div className="text-center p-3 bg-gray-50 rounded-xl text-xs text-gray-400 font-bold border border-gray-100">
                        คุณทำข้อสอบชุดนี้ไปแล้ว

                      <button 
                        onClick={() => isAvailable && onTakeExam(exam)} 
                        disabled={!isAvailable} 
                        className={`w-full py-2.5 rounded-xl font-bold transition-all ${isAvailable ? 'bg-blue-600 text-white hover:shadow-lg active:scale-95' : 'bg-gray-50 text-gray-300 cursor-not-allowed'}`}
                      >
                        เริ่มทดสอบ
                      </button>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // --- คอมโพเนนต์ทำข้อสอบที่มีนาฬิกาจับเวลา ---
    function QuizTaker({ exam, onFinish, onCancel }) {
      const [current, setCurrent] = useState(0);
      const [answers, setAnswers] = useState({});
      const [done, setDone] = useState(false);
      const [timeLeft, setTimeLeft] = useState(exam.duration * 60); // แปลงนาทีเป็นวินาที

      // ระบบนาฬิกานับถอยหลัง
      useEffect(() => {
        if (done || timeLeft <= 0) return;
        const timer = setInterval(() => {
          setTimeLeft(prev => prev - 1);
        }, 1000);

        if (timeLeft === 0) {
          handleAutoSubmit();
        }

        return () => clearInterval(timer);
      }, [timeLeft, done]);

      const formatTime = (seconds) => {
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = seconds % 60;
        return `${h > 0 ? h + ':' : ''}${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
      };

      const handleAutoSubmit = () => {
        if (done) return;
        let s = 0;
        exam.questions.forEach((q, i) => { if (answers[i] === q.answer) s++; });
        setDone(true);
        onFinish(s, exam.questions.length);
      };

      const q = exam.questions?.[current];
      
      if (done) return (
        <div className="text-center p-20 bg-white rounded-3xl shadow-xl animate-bounce">
          <CheckCircle className="w-20 h-20 text-green-500 mx-auto mb-4"/>
          <h2 className="text-2xl font-black">กำลังส่งคำตอบ...</h2>
        </div>
      );

      return (
        <div className="max-w-2xl mx-auto space-y-6">
          <div className="flex justify-between items-center p-4 bg-white rounded-2xl shadow-sm border border-gray-100">
            <div className="flex flex-col">
              <h2 className="font-black text-gray-800">{exam.title}</h2>
              <span className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Question {current+1} / {exam.questions.length}</span>
            </div>
            <div className={`flex items-center gap-2 px-4 py-2 rounded-xl font-black text-lg ${timeLeft < 60 ? 'bg-red-50 text-red-600 animate-pulse' : 'bg-blue-50 text-blue-600'}`}>
              <ClockIcon className="w-5 h-5" />
              {formatTime(timeLeft)}
            </div>
          </div>

          <div className="p-8 bg-white rounded-3xl shadow-sm border border-gray-100 min-h-[350px] flex flex-col justify-center animate-in slide-in-from-right-4 duration-300">
            <h3 className="text-xl font-black text-gray-900 mb-10 leading-relaxed">{q.q}</h3>
            <div className="grid gap-3">
              {q.options.map((o, i) => (
                <button 
                  key={i} 
                  onClick={() => setAnswers({...answers, [current]: i})} 
                  className={`p-5 text-left border-2 rounded-2xl transition-all flex items-center gap-4 ${
                    answers[current] === i 
                      ? 'border-blue-600 bg-blue-50 text-blue-700 font-bold ring-4 ring-blue-100' 
                      : 'border-gray-50 hover:border-blue-200 bg-gray-50/30'
                  }`}
                >
                  <span className={`w-8 h-8 flex items-center justify-center rounded-lg text-sm border-2 ${answers[current] === i ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-400 border-gray-200'}`}>
                    {String.fromCharCode(65 + i)}
                  </span>
                  {o}
                </button>
              ))}
            </div>
          </div>

          <div className="flex justify-between items-center px-2">
            <button onClick={onCancel} className="text-gray-400 text-sm font-bold hover:text-red-500 transition-colors">ยกเลิกการสอบ</button>
            <div className="flex gap-3">
              <button onClick={() => setCurrent(c => c-1)} disabled={current===0} className="px-6 py-3 bg-white border border-gray-100 rounded-2xl text-sm font-bold disabled:opacity-20 shadow-sm">ย้อนกลับ</button>
              {current === exam.questions.length - 1 ? (
                <button 
                  onClick={() => {
                    if(confirm('ยืนยันการส่งข้อสอบ?')) handleAutoSubmit();
                  }} 
                  className="px-8 py-3 bg-green-600 text-white rounded-2xl text-sm font-black shadow-lg shadow-green-200 hover:bg-green-700 transition-all transform hover:scale-105 active:scale-95"
                >
                  ส่งข้อสอบ
                </button>
              ) : (
                <button onClick={() => setCurrent(c => c+1)} className="px-8 py-3 bg-blue-600 text-white rounded-2xl text-sm font-black shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all transform hover:scale-105 active:scale-95">ข้อถัดไป</button>
              )}
            </div>
          </div>
        </div>
      );
    }

    function AdminResultsDashboard({ results, users, exams, onDeleteResult }) {
      const [q, setQ] = useState('');
      const [f, setF] = useState('');
      const filtered = results.filter(r => {
        const u = users.find(u => u.uid === r.userId);
        return (u?.name || '').toLowerCase().includes(q.toLowerCase()) && (!f || r.examId.toString() === f);
      });
      
      const exportToCSV = () => {
        const h = ['วันที่', 'รหัส นร.', 'ชื่อ-นามสกุล', 'วิชา', 'คะแนน'];
        const rows = filtered.map(r => {
          const u = users.find(u => u.uid === r.userId);
          return [r.date?.split('T')[0], u?.studentId, u?.name, r.examTitle, `${r.score}/${r.total}`].map(v => `"${v}"`).join(',');
        });
        const blob = new Blob(['\uFEFF' + h.join(',') + '\n' + rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `ExamResults_${new Date().toISOString().split('T')[0]}.csv`;
        link.click();
      };

      return (
        <div className="space-y-6">
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">

              </div>
              <select value={f} onChange={e=>setF(e.target.value)} className="p-2.5 bg-gray-50 border-none rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none min-w-[150px] font-bold text-gray-500"><option value="">ทุกรายวิชา</option>{exams.map(e=><option key={e.id} value={e.id}>{e.title}</option>)}</select>
            </div>
            <div className="overflow-x-auto">
              <table className="min-w-full text-sm">
                <thead><tr className="text-left text-gray-400 border-b border-gray-50"><th className="pb-4 font-bold uppercase tracking-widest text-[10px]">Date</th><th className="pb-4 font-bold uppercase tracking-widest text-[10px]">Student</th><th className="pb-4 font-bold uppercase tracking-widest text-[10px]">Subject</th><th className="pb-4 font-bold uppercase tracking-widest text-[10px] text-right">Score</th><th className="pb-4 text-right"></th></tr></thead>
                <tbody className="divide-y divide-gray-50">{filtered.map((r,i) => (
                  <tr key={i} className="group hover:bg-gray-50/50 transition-colors">
                    <td className="py-4 font-bold text-gray-400 text-xs">{r.date?.split('T')[0]}</td>
                    <td className="py-4 font-black text-gray-800">{users.find(u=>u.uid===r.userId)?.name}</td>

      );

                  <div><label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-2">Duration (Minutes)</label><input type="number" value={formData.duration} onChange={e => setFormData({...formData, duration: parseInt(e.target.value)})} className="w-full p-3 bg-gray-50 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500 transition-all border-none" /></div>
                </div>
                <div className="p-6 bg-blue-50/20 rounded-3xl border border-blue-50 space-y-3">
                  <p className="text-[10px] font-bold text-blue-400 uppercase tracking-widest">Assign Students (Uncheck all to allow everyone)</p>
                  <div className="grid grid-cols-2 sm:grid-cols-3 gap-3 max-h-32 overflow-y-auto pr-2">
                    {students.map(s => <label key={s.uid} className="flex items-center gap-2 text-xs font-bold text-gray-600 hover:text-blue-600 transition-colors cursor-pointer"><input type="checkbox" checked={formData.assignedUsers.includes(s.uid)} onChange={()=>setFormData({...formData, assignedUsers: formData.assignedUsers.includes(s.uid) ? formData.assignedUsers.filter(i=>i!==s.uid) : [...formData.assignedUsers, s.uid]})} className="w-4 h-4 accent-blue-600" /> {s.name}</label>)}
                  </div>
                </div>
                <div className="space-y-4 pt-4">
                  <div className="flex justify-between items-center"><h3 className="font-black text-xl text-gray-800">Questions ({formData.questions.length})</h3></div>
                  {formData.questions.map((q, i) => (
                    <div key={i} className="p-6 bg-gray-50/50 rounded-3xl space-y-4 relative border border-gray-100 group">
                      <button onClick={()=>{const n=[...formData.questions];n.splice(i,1);setFormData({...formData, questions:n})}} className="absolute top-6 right-6 text-gray-200 hover:text-red-500 transition-colors"><Trash2 className="w-5 h-5"/></button>
                      <div><label className="text-[10px] font-bold text-gray-400 uppercase block mb-1">Question {i+1}</label><textarea value={q.q} onChange={e=>{const n=[...formData.questions];n[i].q=e.target.value;setFormData({...formData, questions:n})}} className="w-full p-3 bg-white rounded-xl text-sm font-bold border-none shadow-sm outline-none" rows="2" /></div>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                        {q.options.map((o, oi) => (
                          <div key={oi} className="flex items-center gap-2 bg-white/50 p-2 rounded-xl border border-white">
                            <input type="radio" checked={q.answer===oi} onChange={()=>{const n=[...formData.questions];n[i].answer=oi;setFormData({...formData, questions:n})}} className="w-4 h-4 accent-green-500" />
                            <input value={o} onChange={e=>{const n=[...formData.questions];n[i].options[oi]=e.target.value;setFormData({...formData, questions:n})}} className="flex-1 p-1 bg-transparent text-xs font-bold outline-none border-none" placeholder={`Choice ${oi+1}`} />
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
                <button onClick={()=>setFormData({...formData, questions: [...formData.questions, {q:'', options:['','','',''], answer:0}]})} className="w-full py-4 border-2 border-dashed border-gray-200 rounded-3xl text-xs font-bold text-gray-300 hover:text-blue-500 hover:border-blue-200 hover:bg-blue-50/10 transition-all uppercase tracking-widest">+ Add New Question</button>
             </div>
             <div className="p-6 bg-gray-50 border-t border-gray-100 flex justify-end gap-3"><button onClick={onClose} className="px-6 py-3 text-xs font-bold text-gray-400 uppercase">Cancel</button><button onClick={()=>onSave(formData)} className="px-10 py-3 bg-blue-600 text-white rounded-2xl text-xs font-black shadow-lg shadow-blue-100 hover:bg-blue-700 transform active:scale-95 transition-all">Save Exam Data</button></div>
          </div>
        </div>
      );
    }

    function AnnouncementFormModal({ initialData, onClose, onSave }) {
      const [formData, setFormData] = useState(initialData || { title: '', content: '' });
      return (
        <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm z-50 flex justify-center items-center p-4">
          <div className="bg-white rounded-3xl w-full max-w-md p-10 animate-in zoom-in-95 duration-200 shadow-2xl">
             <h2 className="text-2xl font-black mb-8 uppercase tracking-tight text-gray-800">News Publisher</h2>
             <div className="space-y-5">
               <div><label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">Subject</label><input type="text" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} className="w-full p-3 bg-gray-50 border-none rounded-xl font-bold outline-none" /></div>
               <div><label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">Detailed Content</label><textarea value={formData.content} onChange={e => setFormData({...formData, content: e.target.value})} className="w-full p-3 bg-gray-50 border-none rounded-xl font-bold outline-none" rows="5" /></div>
             </div>
             <div className="flex flex-col gap-2 mt-10"><button onClick={() => onSave(formData)} className="w-full py-4 bg-orange-500 text-white font-black rounded-2xl shadow-lg shadow-orange-100 hover:bg-orange-600 transform active:scale-95 transition-all uppercase text-xs">Publish Post</button><button onClick={onClose} className="w-full py-3 text-xs font-bold text-gray-300 uppercase tracking-widest">Discard</button></div>
          </div>
        </div>
      );
    }

    function UserFormModal({ initialData, onClose, onSave }) {
      const [formData, setFormData] = useState(initialData || { name: '', email: '', studentId: '', school: '' });
      return (
        <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm z-50 flex justify-center items-center p-4">
          <div className="bg-white rounded-3xl w-full max-w-md p-10 animate-in zoom-in-95 duration-200 shadow-2xl">
             <h2 className="text-2xl font-black mb-8 uppercase tracking-tight text-gray-800">Student Editor</h2>
             <div className="space-y-5">
                <div className="grid grid-cols-2 gap-4">
                  <div><label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">Student ID</label><input type="text" value={formData.studentId} onChange={e => setFormData({...formData, studentId: e.target.value})} className="w-full p-3 bg-gray-50 border-none rounded-xl font-bold outline-none" /></div>
                  <div><label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">Access Level</label><input type="text" disabled value="Student" className="w-full p-3 bg-gray-100 rounded-xl text-gray-400 font-bold border-none" /></div>
                </div>
                <div><label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">Full Name</label><input type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full p-3 bg-gray-50 border-none rounded-xl font-bold outline-none" /></div>
                <div><label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">Gmail Account</label><input type="email" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} className="w-full p-3 bg-gray-50 border-none rounded-xl font-bold outline-none placeholder:text-gray-300" placeholder="user@gmail.com" /></div>
                <div><label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">Room / Class</label><input type="text" value={formData.school} onChange={e => setFormData({...formData, school: e.target.value})} className="w-full p-3 bg-gray-50 border-none rounded-xl font-bold outline-none" placeholder="เช่น ม.6/1" /></div>
             </div>
             <div className="flex flex-col gap-2 mt-10"><button onClick={() => onSave(formData)} className="w-full py-4 bg-purple-600 text-white font-black rounded-2xl shadow-lg shadow-purple-100 hover:bg-purple-700 transform active:scale-95 transition-all uppercase text-xs">Apply Records</button><button onClick={onClose} className="w-full py-3 text-xs font-bold text-gray-300 uppercase tracking-widest">Close</button></div>
          </div>
        </div>
      );
    }

    function TabBtn({ label, active, onClick, color }) {
      const activeClass = color === 'purple' ? 'bg-purple-600 text-white shadow-lg shadow-purple-100' : color === 'orange' ? 'bg-orange-500 text-white shadow-lg shadow-orange-100' : color === 'gray' ? 'bg-gray-800 text-white shadow-lg shadow-gray-200' : 'bg-blue-600 text-white shadow-lg shadow-blue-100';
      return (
        <button 
          onClick={onClick} 
          className={`flex-1 min-w-[100px] py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all duration-300 ${active ? activeClass : 'text-gray-400 hover:text-gray-700 hover:bg-gray-50'}`}
        >
          {label}
        </button>
      );
    }

    function NavItem({ icon, label, isActive, onClick }) {
      return (
        <button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all duration-300 ${isActive ? 'bg-blue-600 text-white shadow-xl shadow-blue-100 translate-x-1' : 'text-gray-400 hover:text-gray-700 hover:bg-gray-50 hover:translate-x-1'}`}>
          <span className={isActive ? 'text-white' : 'text-gray-300'}>{icon}</span> {label}
        </button>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
